name: Survivorship-free walk (sharded)

# Horizontal scale-out for the survivorship-free checkpoint walk.
# Each matrix job is its own runner (its own CPUs) and computes a disjoint
# shard of the universe via `walk_survivorship_free --shard k/N`. Per-ticker
# checkpoint pickles never collide, so shard outputs merge trivially. A final
# collect job stitches every shard's checkpoints together, builds the ML
# dataset, runs the survivorship-free holdout, and commits the verdict back.

# Triggered by editing the workflow or .github/walk_config.env on this branch
# (so the periodic sims_full/ checkpoint commits do NOT re-launch the matrix).
# Params come from walk_config.env; workflow_dispatch inputs override them if the
# workflow ever lands on the default branch.
on:
  push:
    branches: ["claude/survivorship-free-validation-resume-os92w2"]
    paths:
      - ".github/workflows/survivorship_shards.yml"
      - ".github/walk_config.env"
  workflow_dispatch:
    inputs:
      num_shards:
        description: "Number of parallel shards (runners)"
        required: false
        default: ""
      limit:
        description: "Cap tickers per shard (smoke test; blank = full run)"
        required: false
        default: ""
      do_collect:
        description: "Run the collect+commit job after the walk (true/false)"
        required: false
        default: ""

concurrency:
  group: survivorship-shards
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
      num_shards: ${{ steps.gen.outputs.num_shards }}
      limit: ${{ steps.gen.outputs.limit }}
      do_collect: ${{ steps.gen.outputs.do_collect }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - id: gen
        run: |
          source .github/walk_config.env
          NS="${{ inputs.num_shards }}"; [ -z "$NS" ] && NS="$NUM_SHARDS"
          LM="${{ inputs.limit }}"; [ -z "$LM" ] && LM="$LIMIT"
          DC="${{ inputs.do_collect }}"; [ -z "$DC" ] && DC="$DO_COLLECT"
          shards=$(python3 -c "import json; print(json.dumps(list(range(int('$NS')))))")
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "num_shards=$NS" >> "$GITHUB_OUTPUT"
          echo "limit=$LM" >> "$GITHUB_OUTPUT"
          echo "do_collect=$DC" >> "$GITHUB_OUTPUT"
          echo "Config -> shards=$shards limit='$LM' do_collect=$DC"

  prep:
    # Pulls the 255 MB EODHD LFS archive ONCE, ingests delisted names, and
    # publishes the tiny (~2.3 MB) price cache as an artifact so the shard
    # runners never touch LFS (keeps us under the LFS bandwidth quota).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q -r requirements.txt -r requirements-ml.txt
      - name: Extract EODHD archive
        run: |
          cd data
          # unzip exits 1 on the "backslashes as path separators" warning even
          # though extraction (with auto-converted separators) succeeds; bash -e
          # would abort on that, so tolerate rc<=1 and fail only on real errors.
          set +e
          unzip -q -o eodhd.zip -d _x
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then echo "unzip failed (rc=$rc)"; exit "$rc"; fi
          mkdir -p eodhd
          mv _x/Stocks eodhd/Stocks
          mv _x/ETFs eodhd/ETFs
          rmdir _x
          echo "Extracted: $(ls eodhd/Stocks | wc -l) stocks, $(ls eodhd/ETFs | wc -l) ETFs"
      - name: Ingest delisted names
        run: python -m training.survivorship.ingest_delisted
      - name: Warm history bundle
        run: |
          python -c "from training.history import download_history; from training.universe import load_training_universe; h=download_history(load_training_universe()); print('warm:', len(h))"
      - name: Upload price cache
        uses: actions/upload-artifact@v4
        with:
          name: price-cache
          retention-days: 1
          include-hidden-files: true
          path: |
            training/cache/tickers/**
            training/cache/manifests/**
            training/cache/*.pkl
            training/cache/*.json

  walk:
    needs: [config, prep]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.config.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q -r requirements.txt -r requirements-ml.txt
      - name: Restore price cache
        uses: actions/download-artifact@v4
        with:
          name: price-cache
          path: training/cache
      - name: Run shard ${{ matrix.shard }}/${{ needs.config.outputs.num_shards }}
        run: |
          EXTRA=""
          if [ -n "${{ needs.config.outputs.limit }}" ]; then EXTRA="--limit ${{ needs.config.outputs.limit }}"; fi
          python -u -m training.survivorship.walk_survivorship_free \
            --workers "$(nproc)" \
            --shard "${{ matrix.shard }}/${{ needs.config.outputs.num_shards }}" \
            $EXTRA
      - name: Upload shard checkpoints
        uses: actions/upload-artifact@v4
        with:
          name: sims-shard-${{ matrix.shard }}
          retention-days: 3
          path: training/cache/sims_full/*.pkl

  collect:
    needs: [config, walk]
    if: ${{ needs.config.outputs.do_collect == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q -r requirements.txt -r requirements-ml.txt
      - name: Restore price cache
        uses: actions/download-artifact@v4
        with:
          name: price-cache
          path: training/cache
      - name: Merge all shard checkpoints
        uses: actions/download-artifact@v4
        with:
          pattern: sims-shard-*
          merge-multiple: true
          path: training/cache/sims_full
      - name: Checkpoint count
        run: |
          echo "Checkpoints: $(ls training/cache/sims_full/*.pkl 2>/dev/null | wc -l)/899"
      - name: Build dataset
        run: python -m training.ml.dataset --from-checkpoints --out training/ml/datasets/survivorship_free.parquet
      - name: Run holdout validation
        run: |
          python -m training.survivorship.holdout_validation \
            --dataset training/ml/datasets/survivorship_free.parquet \
            | tee /tmp/holdout.txt
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f training/cache/sims_full/ training/ml/datasets/survivorship_free.parquet
          git add training/PORTFOLIO_FINDINGS.md 2>/dev/null || true
          git commit -m "CI: sharded survivorship-free walk results + holdout dataset" || echo "nothing to commit"
          for i in 1 2 3 4; do
            git pull --rebase origin "${{ github.ref_name }}" && git push origin "HEAD:${{ github.ref_name }}" && break || sleep $((2**i))
          done
      - name: Upload holdout report
        uses: actions/upload-artifact@v4
        with:
          name: holdout-report
          path: /tmp/holdout.txt
